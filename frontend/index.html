<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lou — Galerie</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --off-white: #f8f6f3; --warm-gray: #e8e4df; --mid-gray: #b0a99f;
      --dark: #1a1714; --accent: #c8a882;
      --shadow-polaroid: 0 2px 8px rgba(0,0,0,0.12), 0 8px 32px rgba(0,0,0,0.08);
      --shadow-lift: 0 12px 48px rgba(0,0,0,0.18);
    }
    html, body { min-height: 100%; background: var(--off-white); color: var(--dark); font-family: 'DM Sans', sans-serif; }

    /* Auth overlay */
    #auth-overlay {
      position: fixed; inset: 0; background: var(--off-white);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000; flex-direction: column; gap: 1.5rem; padding: 2rem; text-align: center;
    }
    #auth-overlay h1 { font-family: 'Playfair Display', serif; font-size: 2.2rem; font-weight: 400; }
    #auth-overlay h1 em { font-style: italic; color: var(--accent); }
    .auth-card {
      background: white; border-radius: 14px; padding: 2rem;
      width: 100%; max-width: 340px;
      box-shadow: 0 4px 32px rgba(0,0,0,0.08);
      display: flex; flex-direction: column; gap: 1rem;
    }
    .auth-card p { color: var(--mid-gray); font-size: 0.88rem; line-height: 1.6; }
    .auth-card p strong { color: var(--dark); }
    .auth-card input[type="email"] {
      width: 100%; padding: 0.75rem 1rem;
      border: 1px solid var(--warm-gray); border-radius: 8px;
      font-family: 'DM Sans', sans-serif; font-size: 0.95rem;
      outline: none; background: var(--off-white); transition: border-color 0.2s;
    }
    .auth-card input[type="email"]:focus { border-color: var(--accent); background: white; }
    .auth-card .btn-primary {
      width: 100%; padding: 0.8rem; background: var(--dark); color: white; border: none;
      border-radius: 8px; font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
      letter-spacing: 0.04em; cursor: pointer; transition: opacity 0.2s;
    }
    .auth-card .btn-primary:hover { opacity: 0.8; }
    .auth-card .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
    #auth-msg { color: #c0392b; font-size: 0.82rem; min-height: 1rem; }
    #auth-sent { display: none; flex-direction: column; gap: 0.75rem; align-items: center; }
    #auth-sent .sent-icon { font-size: 2.5rem; }
    .btn-link { background: none; border: none; color: var(--mid-gray); font-size: 0.8rem; cursor: pointer; text-decoration: underline; text-underline-offset: 2px; font-family: 'DM Sans', sans-serif; }
    .btn-link:hover { color: var(--dark); }

    /* Header */
    header {
      position: sticky; top: 0; z-index: 100;
      background: rgba(248,246,243,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--warm-gray);
      padding: 1.2rem 2.5rem; display: flex; align-items: center; justify-content: space-between;
    }
    .brand { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 400; color: var(--dark); text-decoration: none; }
    .brand em { font-style: italic; color: var(--accent); }
    .header-right { display: flex; align-items: center; gap: 1.5rem; }
    .photo-count { font-size: 0.78rem; color: var(--mid-gray); letter-spacing: 0.06em; text-transform: uppercase; }
    .btn-manage {
      display: flex; align-items: center; gap: 0.5rem;
      background: var(--dark); color: white; text-decoration: none;
      padding: 0.5rem 1.1rem; border-radius: 6px; font-size: 0.82rem; letter-spacing: 0.04em; transition: opacity 0.2s;
    }
    .btn-manage:hover { opacity: 0.75; }

    /* Gallery */
    main { padding: 3rem 2.5rem 5rem; max-width: 1400px; margin: 0 auto; }
    #empty-state { display: none; flex-direction: column; align-items: center; padding: 8rem 2rem; gap: 1rem; text-align: center; }
    #empty-state .icon { font-size: 3rem; opacity: 0.25; }
    #empty-state p { color: var(--mid-gray); }
    #empty-state a { color: var(--dark); font-weight: 500; font-size: 0.9rem; text-decoration: underline; text-underline-offset: 3px; }
    #gallery { columns: 4 220px; gap: 1.8rem; }
    .polaroid {
      break-inside: avoid; display: inline-block; width: 100%;
      background: white; padding: 0.85rem 0.85rem 2.4rem;
      box-shadow: var(--shadow-polaroid); margin-bottom: 1.8rem;
      cursor: pointer; position: relative;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.3s ease;
      animation: fadeUp 0.5s ease both;
    }
    .polaroid:nth-child(4n+1) { transform: rotate(-1.3deg); }
    .polaroid:nth-child(4n+2) { transform: rotate(0.9deg); }
    .polaroid:nth-child(4n+3) { transform: rotate(-0.5deg); }
    .polaroid:nth-child(4n+4) { transform: rotate(1.1deg); }
    .polaroid:hover { transform: rotate(0deg) scale(1.04) !important; box-shadow: var(--shadow-lift); z-index: 10; }
    .polaroid img { display: block; width: 100%; height: auto; }
    .polaroid .caption {
      position: absolute; bottom: 0.65rem; left: 0; right: 0; text-align: center;
      font-family: 'Playfair Display', serif; font-style: italic; font-size: 0.7rem;
      color: var(--mid-gray); padding: 0 0.5rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Lightbox */
    #lightbox { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 500; align-items: center; justify-content: center; }
    #lightbox.open { display: flex; }
    #lightbox img { max-width: 92vw; max-height: 90vh; object-fit: contain; }
    #lb-close { position: absolute; top: 1.5rem; right: 1.5rem; background: none; border: none; color: white; font-size: 2rem; cursor: pointer; opacity: 0.6; }
    #lb-close:hover { opacity: 1; }
    #lb-nav { position: absolute; bottom: 2rem; left: 50%; transform: translateX(-50%); display: flex; gap: 1rem; align-items: center; }
    #lb-nav button { background: rgba(255,255,255,0.12); border: 1px solid rgba(255,255,255,0.2); color: white; border-radius: 50%; width: 2.5rem; height: 2.5rem; cursor: pointer; font-size: 1.2rem; display: flex; align-items: center; justify-content: center; transition: background 0.2s; }
    #lb-nav button:hover { background: rgba(255,255,255,0.25); }
    #lb-counter { color: rgba(255,255,255,0.45); font-size: 0.8rem; min-width: 4rem; text-align: center; }

    @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; } }
  </style>
</head>
<body>

<div id="auth-overlay">
  <h1>Lou <em>&</em> Photos</h1>
  <div class="auth-card">
    <div id="auth-email-step" style="display:flex; flex-direction:column; gap:1rem;">
      <p>Entrez votre adresse email pour recevoir un <strong>lien de connexion</strong>.</p>
      <input type="email" id="email-input" placeholder="votre@email.com" autocomplete="email"
             onkeydown="if(event.key==='Enter') sendMagicLink()" />
      <button class="btn-primary" id="btn-send" onclick="sendMagicLink()">Envoyer le lien</button>
      <span id="auth-msg"></span>
    </div>
    <div id="auth-sent">
      <div class="sent-icon">✉️</div>
      <p>Lien envoyé à <strong id="sent-email"></strong>.<br><br>Cliquez sur le lien dans votre email pour accéder à la galerie.</p>
      <button class="btn-link" onclick="resetAuthForm()">Utiliser une autre adresse</button>
    </div>
  </div>
</div>

<header>
  <a class="brand" href="/">Lou <em>&</em> Photos</a>
  <div class="header-right">
    <span class="photo-count" id="photo-count"></span>
    <a class="btn-manage" href="/manage.html">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/></svg>
      Gérer
    </a>
  </div>
</header>

<main>
  <div id="empty-state">
    <div class="icon">📷</div>
    <p>Aucune photo pour le moment.</p>
    <a href="/manage.html">Ajouter des photos →</a>
  </div>
  <div id="gallery"></div>
</main>

<div id="lightbox">
  <button id="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lb-img" src="" alt="" />
  <div id="lb-nav">
    <button onclick="navLightbox(-1)">‹</button>
    <span id="lb-counter"></span>
    <button onclick="navLightbox(1)">›</button>
  </div>
</div>

<script>
  const AUTH   = 'https://auth.vivalink.top';
  const API    = 'https://lou.vivalink.top/api';
  const PHOTOS = 'https://lou.vivalink.top/photos';
  let token = localStorage.getItem('device_token') || '';
  let photos = [], lbIdx = 0;

  // Retour du magic link : GET /auth/login?token=XXX
  async function handleLoginCallback() {
    const p = new URLSearchParams(location.search);
    const t = p.get('token');
    if (!t) return false;
    history.replaceState({}, '', location.pathname);
    try {
      const r = await fetch(`${AUTH}/auth/login?token=${encodeURIComponent(t)}`);
      if (r.ok) {
        const data = await r.json();
        token = data.device_token;
        localStorage.setItem('device_token', token);
        return true;
      }
    } catch(e) {}
    return false;
  }

  async function checkAuth() {
    if (!token) return false;
    try {
      const r = await fetch(`${AUTH}/auth/me`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (r.ok) return true;
      token = ''; localStorage.removeItem('device_token');
      return false;
    } catch { return false; }
  }

  async function sendMagicLink() {
    const email = document.getElementById('email-input').value.trim();
    const msg = document.getElementById('auth-msg');
    const btn = document.getElementById('btn-send');
    if (!email) { msg.textContent = 'Adresse email requise.'; return; }
    btn.disabled = true; btn.textContent = 'Envoi…';
    try {
      await fetch(`${AUTH}/auth/request-login`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email })
      });
      // Toujours afficher "lien envoyé" (anti-énumération côté auth-service)
      document.getElementById('auth-email-step').style.display = 'none';
      document.getElementById('sent-email').textContent = email;
      document.getElementById('auth-sent').style.display = 'flex';
    } catch(e) {
      msg.textContent = 'Erreur réseau, réessayez.';
      btn.disabled = false; btn.textContent = 'Envoyer le lien';
    }
  }

  function resetAuthForm() {
    document.getElementById('auth-sent').style.display = 'none';
    document.getElementById('auth-email-step').style.display = 'flex';
    document.getElementById('auth-msg').textContent = '';
    const btn = document.getElementById('btn-send');
    btn.disabled = false; btn.textContent = 'Envoyer le lien';
  }

  async function loadGallery() {
    try {
      const r = await fetch(`${API}/gallery/list`, { headers: { 'Authorization': `Bearer ${token}` } });
      if (r.status === 401) { token = ''; localStorage.removeItem('device_token'); location.reload(); return; }
      photos = await r.json() || [];
      renderGallery();
    } catch(e) { console.error(e); }
  }

  function renderGallery() {
    const gallery = document.getElementById('gallery');
    const empty = document.getElementById('empty-state');
    gallery.innerHTML = '';
    if (!photos.length) { empty.style.display = 'flex'; return; }
    empty.style.display = 'none';
    document.getElementById('photo-count').textContent = `${photos.length} photo${photos.length > 1 ? 's' : ''}`;
    photos.forEach((p, i) => {
      const div = document.createElement('div');
      div.className = 'polaroid';
      div.style.animationDelay = `${i * 0.035}s`;
      const d = new Date(p.created_at);
      const label = d.toLocaleDateString('fr-FR', { day: 'numeric', month: 'long', year: 'numeric' });
      div.innerHTML = `<img src="${PHOTOS}/${p.filename}" loading="lazy" alt="" onerror="this.closest('.polaroid').style.display='none'" /><div class="caption">${label}</div>`;
      div.addEventListener('click', () => openLightbox(i));
      gallery.appendChild(div);
    });
  }

  function openLightbox(idx) { lbIdx = idx; updateLb(); document.getElementById('lightbox').classList.add('open'); document.body.style.overflow = 'hidden'; }
  function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow = ''; }
  function updateLb() { document.getElementById('lb-img').src = `${PHOTOS}/${photos[lbIdx].filename}`; document.getElementById('lb-counter').textContent = `${lbIdx+1} / ${photos.length}`; }
  function navLightbox(d) { lbIdx = (lbIdx + d + photos.length) % photos.length; updateLb(); }
  document.getElementById('lightbox').addEventListener('click', e => { if (e.target === e.currentTarget) closeLightbox(); });
  document.addEventListener('keydown', e => {
    if (!document.getElementById('lightbox').classList.contains('open')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowRight') navLightbox(1);
    if (e.key === 'ArrowLeft') navLightbox(-1);
  });

  (async () => {
    const loggedIn = await handleLoginCallback();
    if (loggedIn || await checkAuth()) {
      document.getElementById('auth-overlay').style.display = 'none';
      loadGallery();
    }
  })();
</script>
</body>
</html>
