name: Deploy Lou Photos

on:
  push:
    branches: [main]
    paths:
      - 'photo-api/**'
      - 'frontend/**'
      - '.github/workflows/deploy.yml'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/photo-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Generate go.sum
        run: cd photo-api && go mod tidy

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push photo-api
        uses: docker/build-push-action@v5
        with:
          context: ./photo-api
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push frontend to apps-vivalink
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "GitHub Actions"
          git clone https://x-access-token:${{ secrets.GH_PAT }}@github.com/polpoul/apps-vivalink.git /tmp/apps-vivalink
          mkdir -p /tmp/apps-vivalink/apps/lou
          cp frontend/index.html /tmp/apps-vivalink/apps/lou/index.html
          cp frontend/manage.html /tmp/apps-vivalink/apps/lou/manage.html
          cd /tmp/apps-vivalink
          git add apps/lou/
          git diff --staged --quiet || git commit -m "update lou frontend"
          git push

      - name: Deploy on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            docker pull ghcr.io/${{ github.repository_owner }}/photo-api:latest
            docker compose -f /opt/vivalink/docker-compose.yml up -d --force-recreate photo-api
            echo "✓ photo-api deployed"
